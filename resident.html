<style>
body{
    margin:0;
    background:#f5f7fb;
    font-family:Arial,sans-serif;
}

.header{
    background:#1565c0;
    color:#fff;
    text-align:center;
    padding:25px;
}

.header h1{
    margin:0;
}

.header p{
    margin-top:10px;
    opacity:.9;
}

.container{
    padding:18px;
}

.card{
    background:#fff;
    border-radius:18px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
    transition:.3s;
}

.card:hover{
    transform:scale(1.02);
}

.card h2{
    margin:0;
    color:#1565c0;
}

.card p{
    color:#555;
    margin-top:10px;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#1565c0;
    display:flex;
    justify-content:space-around;
    padding:12px 0;
}

.bottom-nav a{
    color:white;
    text-decoration:none;
    text-align:center;
    font-size:13px;
    font-weight:bold;
}

body{
    padding-bottom:80px;
}
</style>

</head>

<body>

</div>

<div class="card">

</div>
