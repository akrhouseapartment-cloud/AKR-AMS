<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Residents | AKR AMS</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/residents.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="sidebar-header">

            <img src="../assets/images/logopng.png" class="logo">

            <h2>AKR AMS</h2>

        </div>

        <ul class="menu">

            <li>
                <a href="../admin.html">🏠 Dashboard</a>
            </li>

            <li class="active">
                <a href="residents.html">👥 Residents</a>
            </li>

            <li>
                <a href="flats.html">🏢 Flats</a>
            </li>

            <li>
                <a href="maintenance.html">💰 Maintenance</a>
            </li>

            <li>
                <a href="payments.html">💳 Payments</a>
            </li>

            <li>
                <a href="complaints.html">📋 Complaints</a>
            </li>

            <li>
                <a href="visitors.html">🚶 Visitors</a>
            </li>

            <li>
                <a href="notices.html">📢 Notices</a>
            </li>

            <li>
                <a href="reports.html">📊 Reports</a>
            </li>

            <li>
                <a href="../admin.html" id="logoutBtn">🚪 Logout</a>
            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main-content">

        <header class="topbar">

            <div>

                <h1>Resident Management</h1>

                <p>Manage apartment residents</p>

            </div>

            <button id="addResidentBtn">

                + Add Resident

            </button>

        </header>

        <!-- Search -->

        <section class="panel">

            <div class="search-area">

                <input
                    type="text"
                    id="searchResident"
                    placeholder="Search by Name, Mobile or Flat">

                <select id="statusFilter">

                    <option value="">All Status</option>

                    <option value="Approved">Approved</option>

                    <option value="Pending">Pending</option>

                </select>

            </div>

        </section>

        <!-- Residents Table -->

        <section class="panel">

            <table class="table">

                <thead>

                    <tr>

                        <th>Name</th>

                        <th>Flat</th>

                        <th>Mobile</th>

                        <th>Email</th>

                        <th>Status</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="residentTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<!-- Add/Edit Resident Modal -->

<div class="modal" id="residentModal">

    <div class="modal-content">

        <h2>Add Resident</h2>

        <form id="residentForm">

            <input
                type="text"
                id="fullName"
                placeholder="Full Name"
                required>

            <input
                type="text"
                id="mobile"
                placeholder="Mobile Number"
                required>

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required>

            <select id="flat" required>

                <option value="">Select Flat</option>

                <option>001</option>
                <option>002</option>
                <option>003</option>

                <option>101</option>
                <option>102</option>
                <option>103</option>
                <option>104</option>
                <option>105</option>

                <option>201</option>
                <option>202</option>
                <option>203</option>
                <option>204</option>
                <option>205</option>

                <option>301</option>
                <option>302</option>
                <option>303</option>
                <option>304</option>
                <option>305</option>

                <option>401</option>
                <option>402</option>
                <option>403</option>
                <option>404</option>
                <option>405</option>
                <option>406</option>

                <option>501</option>
                <option>502</option>
                <option>503</option>
                <option>504</option>
                <option>505</option>
                <option>506</option>

            </select>

            <select id="status">

                <option value="Pending">Pending</option>

                <option value="Approved">Approved</option>

            </select>

            <div class="modal-buttons">

                <button type="submit">

                    Save

                </button>

                <button type="button" id="closeModal">

                    Cancel

                </button>

            </div>

        </form>

    </div>

</div>

<script type="module" src="../js/residents.js"></script>

</body>
</html>
