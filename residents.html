<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Residents | AKR AMS</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/residents.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="header">

<img src="assets/images/logopng.png" class="logo" alt="AKR Logo">

<div>
<h2>Residents Directory</h2>
<p>AKR House Apartments</p>
</div>

</header>

<section class="panel">

<input
type="text"
id="searchResident"
placeholder="🔍 Search by Name or Flat">

<button id="addResidentBtn">+ Add Resident</button>

</section>

<table class="resident-table">

<thead>

<tr>

<th>Flat</th>
<th>Name</th>
<th>Mobile</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="residentTableBody">

</tbody>

</table>

<script src="js/residents.js"></script>

</body>
</html>
