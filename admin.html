<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AKR AMS - Admin Dashboard</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="topbar">

    <img src="assets/images/logopng.png" class="logo">

    <h2>AKR AMS</h2>

    <button id="logoutBtn">Logout</button>

</header>

<div class="dashboard">

    <div class="card">
        <h3>Total Residents</h3>
        <h1 id="residentCount">0</h1>
    </div>

    <div class="card">
        <h3>Pending Approval</h3>
        <h1 id="pendingCount">0</h1>
    </div>

    <div class="card">
        <h3>Total Flats</h3>
        <h1>30</h1>
    </div>

    <div class="card">
        <h3>Vacant Flats</h3>
        <h1 id="vacantCount">30</h1>
    </div>

</div>

<section class="section">

<h2>Pending Residents</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Flat</th>
<th>Mobile</th>
<th>Action</th>

</tr>

</thead>

<tbody id="pendingResidents">

</tbody>

</table>

</section>

<section class="section">

<h2>Quick Menu</h2>

<div class="menu-grid">

<button onclick="location.href='maintenance.html'">
Maintenance
</button>

<button onclick="location.href='complaints.html'">
Complaints
</button>

<button onclick="location.href='notices.html'">
Notices
</button>

<button onclick="location.href='visitors.html'">
Visitors
</button>

<button onclick="location.href='profile.html'">
Profile
</button>

</div>

</section>

<script type="module" src="js/admin.js"></script>

</body>

</html>
