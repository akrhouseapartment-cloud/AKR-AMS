<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Complaints | AKR AMS</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/complaints.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<!-- Sidebar -->

<aside class="sidebar">

<div class="sidebar-header">

<img src="../assets/images/logopng.png" class="logo">

<h2>AKR AMS</h2>

</div>

<ul class="menu">

<li><a href="../admin.html">🏠 Dashboard</a></li>

<li><a href="residents.html">👥 Residents</a></li>

<li><a href="flats.html">🏢 Flats</a></li>

<li><a href="maintenance.html">💰 Maintenance</a></li>

<li class="active"><a href="complaints.html">📋 Complaints</a></li>

<li><a href="visitors.html">🚶 Visitors</a></li>

<li><a href="notices.html">📢 Notices</a></li>

<li><a href="../admin.html">🚪 Logout</a></li>

</ul>

</aside>

<!-- Main Content -->

<main class="main-content">

<header class="topbar">

<div>

<h1>Complaint Management</h1>

<p>AKR House Apartments</p>

</div>

<button id="addComplaintBtn">

+ New Complaint

</button>

</header>

<section class="summary-cards">

<div class="summary-card">

<h3>Total</h3>

<h2 id="totalComplaints">0</h2>

</div>

<div class="summary-card">

<h3>Open</h3>

<h2 id="openComplaints">0</h2>

</div>

<div class="summary-card">

<h3>In Progress</h3>

<h2 id="progressComplaints">0</h2>

</div>

<div class="summary-card">

<h3>Resolved</h3>

<h2 id="resolvedComplaints">0</h2>

</div>

</section>

<section class="panel">

<input
type="text"
id="searchComplaint"
placeholder="Search by Flat Number">

<select id="statusFilter">

<option value="">All Status</option>

<option>Open</option>

<option>In Progress</option>

<option>Resolved</option>

</select>

</section>

<table class="complaints-table">

<thead>

<tr>

<th>ID</th>

<th>Flat</th>

<th>Resident</th>

<th>Category</th>

<th>Priority</th>

<th>Status</th>

<th>Date</th>

<th>Action</th>

</tr>

</thead>

<tbody id="complaintsTable">

</tbody>

</table>


  <!-- Complaint Modal -->

<div class="modal" id="complaintModal">

<div class="modal-content">

<h2>Complaint Details</h2>

<label>Flat Number</label>

<input
type="text"
id="complaintFlat">

<label>Resident Name</label>

<input
type="text"
id="complaintResident">

<label>Category</label>

<select id="complaintCategory">

<option value="">Select Category</option>

<option>Electrical</option>

<option>Plumbing</option>

<option>Lift</option>

<option>Water Supply</option>

<option>Cleaning</option>

<option>Parking</option>

<option>Security</option>

<option>Others</option>

</select>

<label>Priority</label>

<select id="complaintPriority">

<option>Low</option>

<option>Medium</option>

<option>High</option>

<option>Emergency</option>

</select>

<label>Description</label>

<textarea
id="complaintDescription"
rows="4"
placeholder="Enter complaint details..."></textarea>

<label>Status</label>

<select id="complaintStatus">

<option>Open</option>

<option>In Progress</option>

<option>Resolved</option>

</select>

<div class="modal-buttons">

<button id="saveComplaint">

💾 Save

</button>

<button id="closeComplaintModal">

❌ Close

</button>

</div>

</div>

</div>

<script type="module" src="../js/complaints.js"></script>

</main>

</div>

</body>

</html>
