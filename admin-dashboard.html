<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | AKR AMS</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">

<img src="assets/images/logopng.png" class="logo" alt="AKR Logo">

<div>
<h2>Admin Dashboard</h2>
<p>AKR House Apartments</p>
</div>

</header>

<section class="features">

<div class="card">
<h3>🏢 Total Flats</h3>
<h2 id="totalFlats">30</h2>
</div>

<div class="card">
<h3>👨‍👩‍👧 Residents</h3>
<h2 id="totalResidents">0</h2>
</div>

<div class="card">
<h3>💰 Maintenance Collected</h3>
<h2 id="maintenanceCollected">₹0</h2>
</div>

<div class="card">
<h3>⏳ Pending Dues</h3>
<h2 id="pendingDues">₹0</h2>
</div>

<div class="card">
<h3>🔧 Open Complaints</h3>
<h2 id="openComplaints">0</h2>
</div>

<div class="card">
<h3>🚶 Visitors Today</h3>
<h2 id="todayVisitors">0</h2>
</div>

</section>

<div style="text-align:center;margin:25px;">
<a href="index.html" class="btn">🏠 Home</a>
</div>

<script src="js/admin-dashboard.js"></script>

</body>
</html>
