<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resident Registration | AKR House Apartments</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="login-container">

<img src="assets/images/logopng.png" class="logo" alt="AKR Logo">

<h2>Resident Registration</h2>

<p>Create your AKR AMS account</p>

<form id="registerForm">

<input
type="text"
id="fullName"
placeholder="Full Name"
required>

<input
type="tel"
id="mobile"
placeholder="Mobile Number"
maxlength="10"
pattern="[0-9]{10}"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Create Password"
minlength="6"
required>

<select id="flat" required>

<option value="">Select Flat Number</option>

<option value="001">001</option>
<option value="002">002</option>
<option value="003">003</option>

<option value="101">101</option>
<option value="102">102</option>
<option value="103">103</option>
<option value="104">104</option>
<option value="105">105</option>

<option value="201">201</option>
<option value="202">202</option>
<option value="203">203</option>
<option value="204">204</option>
<option value="205">205</option>

<option value="301">301</option>
<option value="302">302</option>
<option value="303">303</option>
<option value="304">304</option>
<option value="305">305</option>

<option value="401">401</option>
<option value="402">402</option>
<option value="403">403</option>
<option value="404">404</option>
<option value="405">405</option>
<option value="406">406</option>

<option value="501">501</option>
<option value="502">502</option>
<option value="503">503</option>
<option value="504">504</option>
<option value="505">505</option>
<option value="506">506</option>

</select>

<button type="submit">

Register

</button>

</form>

<p>

Already have an account?

<a href="login.html">

Login Here

</a>

</p>

</div>

<script type="module" src="js/register.js"></script>

</body>

</html>
