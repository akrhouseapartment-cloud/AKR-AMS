<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resident Registration | AKR House Apartments</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="login-container">

<img src="assets/images/logopng.png" class="logo" alt="AKR Logo">

<h2>Resident Registration</h2>

<p>Create your AKR AMS account</p>

<form id="registerForm">

<input
type="text"
id="fullname"
placeholder="Full Name"
required>

<input
type="tel"
id="mobile"
placeholder="Mobile Number"
maxlength="10"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<select id="flat" required>

<option value="">Select Flat Number</option>

<option>001</option>
<option>002</option>
<option>003</option>

<option>101</option>
<option>102</option>
<option>103</option>
<option>104</option>
<option>105</option>

<option>201</option>
<option>202</option>
<option>203</option>
<option>204</option>
<option>205</option>

<option>301</option>
<option>302</option>
<option>303</option>
<option>304</option>
<option>305</option>

<option>401</option>
<option>402</option>
<option>403</option>
<option>404</option>
<option>405</option>
<option>406</option>

<option>501</option>
<option>502</option>
<option>503</option>
<option>504</option>
<option>505</option>
<option>506</option>

</select>

<select id="residentType" required>

<option value="">Resident Type</option>

<option>Owner</option>

<option>Tenant</option>

</select>

<input
type="password"
id="password"
placeholder="Create Password"
required>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<button type="submit">

Register

</button>

</form>

<br>

<a href="login.html">

Already have an account? Login

</a>

<br><br>

<a href="index.html">

← Back to Home

</a>

</div>

<script src="js/register.js"></script>

</body>
</html>
